<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nunes Store</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/jpeg" href="assets/NunnesStoreLogo.jpg" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="logo-container">
        <img
          src="assets/NunnesStoreLogo.jpg"
          alt="Logo Nunes Store"
          class="logo-img"
        />
        <h1 class="logo-texto">NUNES STORE</h1>
      </div>

      <nav>
        <button class="active" data-categoria="todos">Todos</button>
        <button data-categoria="roupas">Roupas</button>
        <button data-categoria="tenis">Tênis</button>
      </nav>
    </header>

    <main class="produtos">
      <div class="card tenis">
        <div class="img-container">
          <img src="assets/NewBalance9060.webp" alt="New Balance 9060" />
        </div>
        <h2>New Balance 9060</h2>
        <p>R$ 399,90</p>
        <a
          href="https://wa.me/5511999999999?text=Tenho interesse no New Balance 9060"
          target="_blank"
          >Comprar</a
        >
      </div>

      <div class="card tenis">
        <div class="img-container">
          <img src="assets/NikeTwistBranco.webp" alt="Nike Twist Branco" />
        </div>
        <h2>Nike Twist Branco</h2>
        <p>R$ 299,90</p>
        <a
          href="https://wa.me/5511999999999?text=Tenho interesse no Nike Twist Branco"
          target="_blank"
          >Comprar</a
        >
      </div>

      <div class="card roupas">
        <div class="img-container">
          <img src="assets/CamisaCorinthians.webp" alt="Camisa Corinthians" />
        </div>
        <h2>Camisa Corinthians</h2>
        <p>R$ 199,90</p>
        <a
          href="https://wa.me/5511999999999?text=Tenho interesse na Camisa Corinthians"
          target="_blank"
          >Comprar</a
        >
      </div>

      <div class="card roupas">
        <div class="img-container">
          <img src="assets/ShortsNikeSwoosh.avif" alt="Shorts Nike Swoosh" />
        </div>
        <h2>Shorts Nike Swoosh</h2>
        <p>R$ 299,90</p>
        <a
          href="https://wa.me/5511999999999?text=Tenho interesse no Shorts Nike Swoosh"
          target="_blank"
          >Comprar</a
        >
      </div>

      <div class="card roupas">
        <div class="img-container">
          <img src="assets/MoletomNike.webp" alt="Moletom Nike" />
        </div>
        <h2>Moletom Nike</h2>
        <p>R$ 599,90</p>
        <a
          href="https://wa.me/5511999999999?text=Tenho interesse no Moletom Nike"
          target="_blank"
          >Comprar</a
        >
      </div>

      <div class="card tenis">
        <div class="img-container">
          <img src="assets/NIkeAirForce.avif" alt="Nike Air Force 1" />
        </div>
        <h2>Nike Air Force 1</h2>
        <p>R$ 799,90</p>
        <a
          href="https://wa.me/5511999999999?text=Tenho interesse no Nike Air Force 1"
          target="_blank"
          >Comprar</a
        >
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
